<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRD Wallet Extension</title>
    <style>
        :root {
            --bg-deep: #1a1438;
            --bg-keypad: #231b4d;
            --accent-blue: #31aade;
            --text-gray: #8e8e93;
            --btc-grad: linear-gradient(135deg, #f7931a, #ffab44);
            --eth-grad: linear-gradient(135deg, #627eea, #8da2f2);
            --brd-grad: linear-gradient(135deg, #ff5e62, #ff9966);
        }

        body, html {
            margin: 0; padding: 0;
            width: 360px; height: 580px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            background-color: var(--bg-deep);
            color: white;
            overflow: hidden;
        }

        .page { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }

        /* --- PAGE 1: START --- */
        #landing-page { justify-content: center; align-items: center; text-align: center; }
        .welcome-title { font-size: 50px; font-weight: 900; background: var(--brd-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .start-btn { margin-top: 30px; background: var(--accent-blue); color: white; border: none; padding: 15px 50px; border-radius: 30px; font-weight: bold; cursor: pointer; }

        /* --- PAGE 2: DASHBOARD (Updated with Icons) --- */
        #dashboard-page { padding: 20px; box-sizing: border-box; }
        .header-logo { font-size: 28px; font-weight: 800; margin-bottom: 25px; background: var(--brd-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .crypto-card {
            display: flex; align-items: center; padding: 16px;
            border-radius: 12px; margin-bottom: 12px; cursor: pointer;
            transition: 0.2s; position: relative;
        }
        .crypto-card:hover { transform: scale(1.02); }
        .card-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 15px; }
        .card-info { flex: 1; }
        .card-info .name { display: block; font-weight: bold; font-size: 16px; }
        .card-info .rate { font-size: 11px; opacity: 0.7; }
        
        /* الأيقونة التي طلبتها للضغط */
        .arrow-icon { font-size: 18px; opacity: 0.5; margin-left: 10px; transition: 0.3s; }
        .crypto-card:hover .arrow-icon { opacity: 1; transform: translateX(3px); }

        /* --- PAGE 3: CALCULATOR (Image 1 Style) --- */
        #calc-page { background: #f4f7f9; color: #333; }
        .calc-header { background: var(--bg-keypad); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .calc-input-section { background: white; padding: 20px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .label { color: var(--accent-blue); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .val-container { display: flex; align-items: baseline; }
        .main-val { font-size: 32px; font-weight: 400; color: #000; }
        .currency-tag { margin-left: 10px; font-weight: bold; color: #555; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        
        .receive-box { background: #f9f9f9; padding: 20px; border-bottom: 1px solid #eee; }
        .receive-val { font-size: 24px; color: #999; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--bg-keypad); flex: 1; }
        .key { display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; border: 0.1px solid rgba(255,255,255,0.02); }
        .key:active { background: rgba(255,255,255,0.1); }
        .next-action { background: var(--accent-blue); color: white; padding: 20px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="landing-page" class="page active">
        <div class="welcome-title">BRD</div>
        <button class="start-btn" onclick="showPage('dashboard-page')">GET STARTED</button>
    </div>

    <div id="dashboard-page" class="page">
        <div class="header-logo">BRD</div>
        
        <div class="crypto-card" style="background: var(--btc-grad);" onclick="openCalc('BTC', 64250)">
            <div class="card-icon">₿</div>
            <div class="card-info"><span class="name">Bitcoin</span><span class="rate">$64,250.00 per BTC</span></div>
            <div class="arrow-icon">❯</div>
        </div>

        <div class="crypto-card" style="background: var(--eth-grad);" onclick="openCalc('ETH', 3450)">
            <div class="card-icon">Ξ</div>
            <div class="card-info"><span class="name">Ethereum</span><span class="rate">$3,450.12 per ETH</span></div>
            <div class="arrow-icon">❯</div>
        </div>
    </div>

    <div id="calc-page" class="page">
        <div class="calc-header">
            <span onclick="showPage('dashboard-page')" style="cursor:pointer">✕</span>
            <span id="live-rate" style="font-size: 12px;">1 BTC = $64,250.56</span>
            <span></span>
        </div>

        <div class="calc-input-section">
            <div class="label">Pay With</div>
            <div class="input-row">
                <div class="main-val">$<span id="usd-display">50</span></div>
                <div class="currency-tag">🇺🇸 USD ▾</div>
            </div>
        </div>

        <div class="receive-box">
            <div class="label">Receive</div>
            <div class="input-row">
                <div class="receive-val" id="crypto-display">0.00077821</div>
                <div class="currency-tag" id="target-coin">BTC ▾</div>
            </div>
        </div>

        <div class="keypad">
            <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
            <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
            <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
            <div class="key" onclick="press('.')">.</div><div class="key" onclick="press('0')">0</div><div class="key" onclick="press('del')">⌫</div>
        </div>

        <div class="next-action">NEXT</div>
    </div>

    <script>
        let currentUSD = "50";
        let activeRate = 64250;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openCalc(coin, rate) {
            activeRate = rate;
            document.getElementById('target-coin').innerText = coin + " ▾";
            document.getElementById('live-rate').innerText = `1 ${coin} = $${rate.toLocaleString()}`;
            updateValues();
            showPage('calc-page');
        }

        function press(num) {
            if(num === 'del') {
                currentUSD = currentUSD.length > 1 ? currentUSD.slice(0, -1) : "0";
            } else {
                if(currentUSD === "0" && num !== '.') currentUSD = num;
                else if(currentUSD.length < 9) currentUSD += num;
            }
            updateValues();
        }

        function updateValues() {
            document.getElementById('usd-display').innerText = currentUSD;
            const cryptoResult = parseFloat(currentUSD) / activeRate;
            document.getElementById('crypto-display').innerText = cryptoResult.toFixed(8);
        }
    </script>
</body>
</html>
